name: 'Lock Threads'

on:
  schedule:
    # avoid rate limit at 00:00 everyday
    - cron: '37 2 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  action:
    runs-on: ubuntu-latest
    steps:
      - name: Lock inactive issues and pull requests
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          INACTIVE_DAYS: '30'
        run: |
          python3 <<'PY'
          import datetime as dt
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request

          token = os.environ['GITHUB_TOKEN']
          repository = os.environ['REPOSITORY']
          inactive_days = int(os.environ['INACTIVE_DAYS'])
          cutoff = dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=inactive_days)

          headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'latex-secure-lock-workflow'
          }

          def api_request(method: str, url: str, payload=None):
              body = None
              request = urllib.request.Request(url, method=method, headers=headers)
              if payload is not None:
                  body = json.dumps(payload).encode('utf-8')
                  request.add_header('Content-Type', 'application/json')
              with urllib.request.urlopen(request, data=body) as response:
                  link_header = response.headers.get('Link', '')
                  content = response.read().decode('utf-8')
                  return (json.loads(content) if content else None), link_header

          def iter_issues(url: str):
              next_url = url
              while next_url:
                  page_items, link_header = api_request('GET', next_url)
                  for item in page_items or []:
                      yield item
                  next_url = None
                  for part in link_header.split(','):
                      if 'rel="next"' in part:
                          next_url = part[part.find('<') + 1:part.find('>')]
                          break

          encoded_repo = urllib.parse.quote(repository, safe='')
          list_url = f'https://api.github.com/repos/{encoded_repo}/issues?state=open&sort=updated&direction=asc&per_page=100'

          locked = 0
          for item in iter_issues(list_url):
              updated_at = dt.datetime.fromisoformat(item['updated_at'].replace('Z', '+00:00'))
              if updated_at >= cutoff:
                  break
              if item.get('locked'):
                  continue
              number = item['number']
              issue_type = 'pull request' if 'pull_request' in item else 'issue'
              print(f'Locking {issue_type} #{number} last updated at {item["updated_at"]}')
              lock_url = f'https://api.github.com/repos/{encoded_repo}/issues/{number}/lock'
              api_request('PUT', lock_url, {'lock_reason': 'resolved'})
              locked += 1

          print(f'Locked {locked} inactive conversation(s).')
          PY
