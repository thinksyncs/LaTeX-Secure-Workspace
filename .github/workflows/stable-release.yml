name: Stable Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable GitHub release tag to publish.
        required: true

permissions: read-all

concurrency:
  group: stable-release-${{ github.event.release.tag_name || inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        ref: ${{ env.RELEASE_TAG }}
    - uses: ./.github/actions/setup-texlive-linux
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
        cache: npm
    - name: Validate tag matches package version
      run: |
        package_version="$(node -p "require('./package.json').version")"
        normalized_tag="${RELEASE_TAG#v}"
        if [ "$normalized_tag" != "$package_version" ]; then
          echo "Release tag $RELEASE_TAG does not match package.json version $package_version" >&2
          exit 1
        fi
    - name: Validate stable release stays on current major line
      run: |
        normalized_tag="${RELEASE_TAG#v}"
        previous_tag="$(git tag --list 'v*' --sort=-v:refname | grep -Fxv "$RELEASE_TAG" | head -n1)"
        if [ -z "$previous_tag" ]; then
          previous_tag="$(git tag --list --sort=-v:refname | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' | grep -Fxv "$normalized_tag" | head -n1)"
        fi
        if [ -z "$previous_tag" ]; then
          echo "No previous stable tag found; skipping major-line validation."
          exit 0
        fi

        previous_version="${previous_tag#v}"
        previous_major="${previous_version%%.*}"
        current_major="${normalized_tag%%.*}"
        if [ "$current_major" != "$previous_major" ]; then
          echo "Stable releases must update minor or patch versions without changing the major version." >&2
          echo "Previous stable tag: $previous_tag" >&2
          echo "Current release tag: $RELEASE_TAG" >&2
          exit 1
        fi
    - name: Install dependencies
      run: npm ci --ignore-scripts
    - name: Verify release build
      run: xvfb-run -a npm run release:verify
    - name: Package VSIX
      id: package
      run: |
        package_name="$(node -p "require('./package.json').name")"
        package_version="$(node -p "require('./package.json').version")"
        mkdir -p "$RUNNER_TEMP/vsix"
        vsix_path="$RUNNER_TEMP/vsix/${package_name}-${package_version}.vsix"
        npx vsce package --out "$vsix_path"
        echo "vsix_path=$vsix_path" >> "$GITHUB_OUTPUT"
    - name: Publish stable extension registries
      uses: ./.github/actions/publish-extension
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
        OVSX_PAT: ${{ secrets.OVSX_PAT }}
      with:
        vsix_path: ${{ steps.package.outputs.vsix_path }}
        publish_openvsx: 'true'
    - name: Upload VSIX to GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "$RELEASE_TAG" "${{ steps.package.outputs.vsix_path }}" --clobber
    - name: Archive VSIX artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: stable-vsix
        path: ${{ steps.package.outputs.vsix_path }}
