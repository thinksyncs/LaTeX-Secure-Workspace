name: Stable Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0
        ref: ${{ github.event.release.tag_name }}
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
        cache: npm
    - name: Validate tag matches package version
      env:
        RELEASE_TAG: ${{ github.event.release.tag_name }}
      run: |
        package_version="$(node -p "require('./package.json').version")"
        normalized_tag="${RELEASE_TAG#v}"
        if [ "$normalized_tag" != "$package_version" ]; then
          echo "Release tag $RELEASE_TAG does not match package.json version $package_version" >&2
          exit 1
        fi
    - name: Install dependencies
      run: npm ci --ignore-scripts
    - name: Verify release build
      run: npm run release:verify
    - name: Package VSIX
      id: package
      run: |
        package_name="$(node -p "require('./package.json').name")"
        package_version="$(node -p "require('./package.json').version")"
        mkdir -p artifacts/vsix
        vsix_path="artifacts/vsix/${package_name}-${package_version}.vsix"
        npx vsce package --out "$vsix_path"
        echo "vsix_path=$vsix_path" >> "$GITHUB_OUTPUT"
    - name: Publish stable Marketplace release
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: npx vsce publish --packagePath "${{ steps.package.outputs.vsix_path }}"
    - name: Upload VSIX to GitHub release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "${{ github.event.release.tag_name }}" "${{ steps.package.outputs.vsix_path }}" --clobber
    - name: Archive VSIX artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: stable-vsix
        path: ${{ steps.package.outputs.vsix_path }}
