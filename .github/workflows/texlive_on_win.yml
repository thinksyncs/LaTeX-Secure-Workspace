name: TeX Live (current) on Windows
env:
  cache-version: tl-current-v1
  TEXLIVE_BOOTSTRAP_REPOSITORY: https://ctan.net/systems/texlive/tlnet
  TEXLIVE_KEY_FINGERPRINT: C78B82D8C79512F79CC0D7C80D5E5D9106BAB6BC
on: [push, pull_request]

permissions:
  contents: read

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
    - name: Prepare git
      run: git config --global core.autocrlf false
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
    - name: Set up PATH
      run: |
        echo "C:\strawberry\c\bin;C:\strawberry\perl\site\bin;C:\strawberry\perl\bin" >> $GITHUB_PATH
        echo "D:\texlive\bin\windows" >> $GITHUB_PATH
      shell: bash
    - name: Cache TeX Live
      id: cache-texlive
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: D:\texlive
        key: ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
        restore-keys: |
          ${{ env.cache-version }}-${{ runner.os }}-texlive-essential
    - name: Download install-tl.zip
      run: |
        if ! command -v gpg >/dev/null 2>&1; then
          choco.exe install gnupg --no-progress -y
          export PATH="/c/ProgramData/chocolatey/bin:/c/Program Files (x86)/GnuPG/bin:/c/Program Files/GnuPG/bin:$PATH"
        fi
        gpg --version
        download_and_verify() {
          curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -o install-tl.zip "$TEXLIVE_BOOTSTRAP_REPOSITORY/install-tl.zip"
          curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -o install-tl.zip.sha512 "$TEXLIVE_BOOTSTRAP_REPOSITORY/install-tl.zip.sha512"
          curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -o install-tl.zip.sha512.asc "$TEXLIVE_BOOTSTRAP_REPOSITORY/install-tl.zip.sha512.asc"
          sha512sum --check install-tl.zip.sha512 || return 1
          gpg --batch --verify install-tl.zip.sha512.asc install-tl.zip.sha512 || return 1
          echo "TEXLIVE_REPOSITORY=$TEXLIVE_BOOTSTRAP_REPOSITORY" >> "$GITHUB_ENV"
        }
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -O https://tug.org/texlive/files/texlive.asc
        test "$(gpg --show-keys --with-colons texlive.asc | awk -F: '/^fpr:/ {print $10; exit}')" = "$TEXLIVE_KEY_FINGERPRINT"
        export GNUPGHOME="$(mktemp -d)"
        gpg --batch --import texlive.asc
        for attempt in 1 2 3 4 5; do
          if download_and_verify; then
            break
          fi
          rm -f install-tl.zip install-tl.zip.sha512 install-tl.zip.sha512.asc
          if [ "$attempt" -eq 5 ]; then
            exit 1
          fi
          sleep 2
        done
        unzip -q install-tl.zip
        mv install-tl-2* install-tl-dir
        rm -rf "$GNUPGHOME"
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: bash
    - name: Run install-tl-windows.bat
      run: |
        install-tl-dir\install-tl-windows.bat --repository %TEXLIVE_REPOSITORY% --profile test\config\texlive_windows.profile
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: cmd
    - name: Trust TeX Live signing key
      shell: pwsh
      run: |
        if (-not (Get-Command gpg -ErrorAction SilentlyContinue)) {
          choco.exe install gnupg --no-progress -y
          $env:PATH = "C:\ProgramData\chocolatey\bin;C:\Program Files (x86)\GnuPG\bin;C:\Program Files\GnuPG\bin;$env:PATH"
        }
        $gpg = (Get-Command gpg).Source
        curl.exe --fail --show-error --silent --location --proto "=https" --tlsv1.2 -o texlive.asc https://tug.org/texlive/files/texlive.asc
        $fingerprint = (& $gpg --show-keys --with-colons texlive.asc | Select-String '^fpr:' | Select-Object -First 1).ToString().Split(':')[9]
        if ($fingerprint -ne $env:TEXLIVE_KEY_FINGERPRINT) {
          throw "Unexpected TeX Live key fingerprint: $fingerprint"
        }
        $tlGnuPgHome = '.tl-gpg'
        if (Test-Path $tlGnuPgHome) {
          Remove-Item -Recurse -Force $tlGnuPgHome
        }
        New-Item -ItemType Directory -Path $tlGnuPgHome | Out-Null
        New-Item -ItemType File -Path (Join-Path $tlGnuPgHome 'repository-keys.gpg') | Out-Null
        $env:TL_GNUPGHOME = $tlGnuPgHome
        & 'D:\texlive\bin\windows\tlmgr.bat' key add texlive.asc
        & $gpg --homedir $tlGnuPgHome --keyring repository-keys.gpg --list-keys $env:TEXLIVE_KEY_FINGERPRINT
        "TL_GNUPGHOME=$tlGnuPgHome" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
    - name: Run tlmgr install
      shell: pwsh
      run: |
        $tlmgr = 'D:\texlive\bin\windows\tlmgr.bat'
        & $tlmgr --verify-repo=all option repository $env:TEXLIVE_REPOSITORY
        & $tlmgr --verify-repo=all update --self
        & $tlmgr --verify-repo=all install collection-latex
        & $tlmgr --verify-repo=all install import subfiles latexmk makeindex
        & $tlmgr --verify-repo=all install chktex lacheck latexindent
      if: steps.cache-texlive.outputs.cache-hit != 'true'
    - name: Verify TeX Live repository metadata
      shell: pwsh
      run: |
        $tlmgr = 'D:\texlive\bin\windows\tlmgr.bat'
        & $tlmgr --verify-repo=all --repository $env:TEXLIVE_BOOTSTRAP_REPOSITORY update --list 2>&1 | Tee-Object -FilePath tlmgr-verify.log
        if (-not (Select-String -Path tlmgr-verify.log -SimpleMatch '(verified)' -Quiet)) {
          throw 'TeX Live repository metadata was not verified.'
        }
    - name: Create latexindent wrapper
      run: |
        if (Get-Command latexindent -ErrorAction SilentlyContinue) { exit 0 }
        $script = & kpsewhich latexindent.pl
        if (-not $script) { throw 'latexindent.pl not found via kpsewhich' }
        @(
          '@echo off',
          'perl "' + $script + '" %*'
        ) | Set-Content -Path 'D:\texlive\bin\windows\latexindent.bat' -Encoding ASCII
    - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
      with:
        node-version: '20'
    - run: |
        perl -v
        perl -MCwd -e 'print $Cwd::VERSION."\n";'
    - run: |
        latex -v
        latexmk -v
    - name: Install Node dependencies and compile
      shell: pwsh
      run: |
        if ('${{ github.event_name }}' -eq 'pull_request') {
          npm ci --ignore-scripts
        } else {
          npm ci
        }
        npm run compile
    - name: Run tests
      run: npm run test:ci
    - name: Package VSIX
      shell: pwsh
      run: |
        $vsixDir = Join-Path $env:RUNNER_TEMP 'vsix'
        New-Item -ItemType Directory -Path $vsixDir -Force | Out-Null
        $packageName = node -p "require('./package.json').name"
        $packageVersion = node -p "require('./package.json').version"
        $vsixPath = Join-Path $vsixDir "$packageName-$packageVersion.vsix"
        npx vsce package --out $vsixPath
    - name: Archive VSIX artifact
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: vsix-windows
        path: ${{ runner.temp }}/vsix/*.vsix
    - name: Archive test logs
      if: always()
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
      with:
        name: test-log
        path: test/log/**/*.log
