name: Security Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure telemetry SDK is not introduced
        run: |
          if git grep -nE 'vscode-extension-telemetry|applicationinsights|@opentelemetry|opentelemetry' -- src package.json; then
            echo 'Telemetry-related SDK usage detected in extension runtime surface.'
            exit 1
          fi

      - name: "Ensure `shell: true` is not used in src"
        run: |
          MATCHES="$(git grep -n 'shell: true' -- src || true)"
          if [ -z "$MATCHES" ]; then
            exit 0
          fi
          echo "$MATCHES"
          echo 'Unexpected `shell: true` usage found in src'
          exit 1

      - name: "Ensure `pull_request_target` is not introduced"
        run: |
          MATCHES="$(grep -R -n --include='*.yml' --include='*.yaml' 'pull_request_target' .github/workflows | grep -v '^.github/workflows/security-guardrails.yml:' || true)"
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo 'Do not use pull_request_target for this repository hardening baseline.'
            exit 1
          fi

      - name: Ensure workflows do not use plaintext HTTP downloads
        run: |
          MATCHES="$(git grep -nE 'http://' -- .github/workflows | grep -v '^.github/workflows/security-guardrails.yml:' || true)"
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo 'Plaintext HTTP is not allowed in workflows. Use HTTPS-only downloads.'
            exit 1
          fi

      - name: Ensure workflows verify downloaded installers
        run: |
          for file in .github/actions/setup-texlive-linux/action.yml .github/workflows/texlive_on_mac.yml .github/workflows/texlive_on_win.yml; do
            grep -q 'sha512' "$file" || { echo "Missing checksum verification in $file"; exit 1; }
            grep -q 'gpg' "$file" || { echo "Missing signature verification in $file"; exit 1; }
          done

      - name: Ensure pull request installs disable npm lifecycle scripts
        run: |
          for file in .github/workflows/texlive_on_linux.yml .github/workflows/texlive_on_mac.yml .github/workflows/texlive_on_win.yml; do
            grep -q 'npm ci --ignore-scripts' "$file" || { echo "Missing npm --ignore-scripts hardening in $file"; exit 1; }
          done

      - name: Ensure release workflows use the shared publish action
        run: |
          for file in .github/workflows/stable-release.yml .github/workflows/daily-release.yml; do
            grep -q 'uses: ./.github/actions/publish-extension' "$file" || { echo "Missing shared publish action in $file"; exit 1; }
          done

      - name: Ensure shared publish action covers both registry credentials
        run: |
          file=.github/actions/publish-extension/action.yml
          grep -q 'VSCE_PAT' "$file" || { echo "Missing VSCE_PAT handling in $file"; exit 1; }
          grep -q 'OVSX_PAT' "$file" || { echo "Missing OVSX_PAT handling in $file"; exit 1; }
          grep -q 'resolvePublishPlan.mjs' "$file" || { echo "Missing shared publish-plan resolver in $file"; exit 1; }

      - name: Ensure release docs match fail-closed publish behavior
        run: |
          grep -q 'fail closed' .github/workflows/README.md || { echo 'Release workflow README must document fail-closed behavior.'; exit 1; }
          grep -q 'canonical repository' .github/workflows/README.md || { echo 'Release workflow README must document canonical repository behavior.'; exit 1; }
