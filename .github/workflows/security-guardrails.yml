name: Security Guardrails

on:
  pull_request:

permissions:
  contents: read

jobs:
  guardrails:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Ensure telemetry SDK is not introduced
        run: |
          if git grep -nE 'vscode-extension-telemetry|applicationinsights|@opentelemetry|opentelemetry' -- src package.json; then
            echo 'Telemetry-related SDK usage detected in extension runtime surface.'
            exit 1
          fi

      - name: "Ensure `shell: true` is not used in src"
        run: |
          MATCHES="$(git grep -n "shell: true" -- src || true)"
          if [ -z "$MATCHES" ]; then
            exit 0
          fi
          echo "$MATCHES"
          echo "Unexpected \`shell: true\` usage found in src"
          exit 1

      - name: "Ensure `pull_request_target` is not introduced"
        run: |
          MATCHES="$(grep -R -n --include='*.yml' --include='*.yaml' 'pull_request_target' .github/workflows | grep -v '^.github/workflows/security-guardrails.yml:' || true)"
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo 'Do not use pull_request_target for this repository hardening baseline.'
            exit 1
          fi

      - name: Ensure workflows do not use plaintext HTTP downloads
        run: |
          MATCHES="$(git grep -nE 'http://' -- .github/workflows | grep -v '^.github/workflows/security-guardrails.yml:' || true)"
          if [ -n "$MATCHES" ]; then
            echo "$MATCHES"
            echo 'Plaintext HTTP is not allowed in workflows. Use HTTPS-only downloads.'
            exit 1
          fi

      - name: Ensure workflows verify downloaded installers
        run: |
          for file in .github/actions/setup-texlive-linux/action.yml .github/workflows/texlive_on_mac.yml .github/workflows/texlive_on_win.yml; do
            grep -q 'sha512' "$file" || { echo "Missing checksum verification in $file"; exit 1; }
            grep -q 'gpg' "$file" || { echo "Missing signature verification in $file"; exit 1; }
          done

      - name: Ensure TeX Live package metadata verification is fail-closed
        run: |
          for file in .github/actions/setup-texlive-linux/action.yml .github/workflows/texlive_on_mac.yml .github/workflows/texlive_on_win.yml; do
            grep -q -- '--verify-repo=all' "$file" || { echo "Missing tlmgr --verify-repo=all in $file"; exit 1; }
            grep -q 'key add texlive.asc' "$file" || { echo "Missing tlmgr trusted key import in $file"; exit 1; }
            grep -q 'TL_GNUPGHOME' "$file" || { echo "Missing pinned GnuPG home for tlmgr verification in $file"; exit 1; }
            grep -q '(verified)' "$file" || { echo "Missing verified repository metadata assertion in $file"; exit 1; }
          done
          grep -q "\$tlGnuPgHome = '.tl-gpg'" .github/workflows/texlive_on_win.yml || { echo "Windows tlmgr verification must use a relative GnuPG home"; exit 1; }

      - name: Ensure pull request installs disable npm lifecycle scripts
        run: |
          for file in .github/workflows/texlive_on_linux.yml .github/workflows/texlive_on_mac.yml .github/workflows/texlive_on_win.yml; do
            grep -q 'npm ci --ignore-scripts' "$file" || { echo "Missing npm --ignore-scripts hardening in $file"; exit 1; }
          done

      - name: Ensure runtime dependencies do not use native addons
        run: node ./dev/auditNativeAddons.mjs

      - name: Ensure stable release uses the shared Marketplace publish action
        run: |
          file=.github/workflows/stable-release.yml
          grep -q 'uses: ./.github/actions/publish-extension' "$file" || { echo "Missing shared publish action in $file"; exit 1; }
          grep -q 'VSCE_PAT' "$file" || { echo "Stable release must pass VSCE_PAT to the shared publish action."; exit 1; }
          grep -q "publish_openvsx: 'false'" "$file" || { echo "Stable release must keep Open VSX disabled unless explicitly re-enabled."; exit 1; }

      - name: Ensure green CI can publish a stable release
        run: |
          file=.github/workflows/auto-stable-release.yml
          grep -q 'workflow_run:' "$file" || { echo "Auto stable release must be gated by workflow_run."; exit 1; }
          grep -q 'AUTORELEASE_REQUIRED_WORKFLOWS' "$file" || { echo "Auto stable release must list required workflows."; exit 1; }
          grep -q 'createStableReleaseAfterCi.mjs' "$file" || { echo "Auto stable release must use the checked release helper."; exit 1; }
          grep -q 'actions: write' "$file" || { echo "Auto stable release must be able to dispatch stable-release.yml."; exit 1; }
          grep -q 'releaseExists' dev/createStableReleaseAfterCi.mjs || { echo "Auto release helper must skip existing releases."; exit 1; }
          grep -q 'branchSha !== headSha' dev/createStableReleaseAfterCi.mjs || { echo "Auto release helper must skip stale commits."; exit 1; }
          grep -q '/dispatches' dev/createStableReleaseAfterCi.mjs || { echo "Auto release helper must dispatch stable-release.yml after creating a release."; exit 1; }
          grep -q 'workflow_dispatch:' .github/workflows/stable-release.yml || { echo "Stable release must support workflow_dispatch from auto release."; exit 1; }

      - name: Ensure daily release stays a GitHub-only preview artifact
        run: |
          file=.github/workflows/daily-release.yml
          ! grep -q 'uses: ./.github/actions/publish-extension' "$file" || { echo "Daily release must not publish to extension registries."; exit 1; }
          ! grep -q -- '--pre-release' "$file" || { echo "Daily release must not use the Marketplace pre-release channel."; exit 1; }
          grep -q 'gh release create daily' "$file" || { echo "Daily release must refresh the GitHub daily prerelease."; exit 1; }
          grep -q -- '--prerelease' "$file" || { echo "Daily GitHub release must stay marked as prerelease."; exit 1; }

      - name: Ensure shared publish action covers both registry credentials
        run: |
          file=.github/actions/publish-extension/action.yml
          grep -q 'VSCE_PAT' "$file" || { echo "Missing VSCE_PAT handling in $file"; exit 1; }
          grep -q 'OVSX_PAT' "$file" || { echo "Missing OVSX_PAT handling in $file"; exit 1; }
          grep -q 'resolvePublishPlan.mjs' "$file" || { echo "Missing shared publish-plan resolver in $file"; exit 1; }

      - name: Ensure release docs match fail-closed publish behavior
        run: |
          grep -q 'fail closed' .github/workflows/README.md || { echo 'Release workflow README must document fail-closed behavior.'; exit 1; }
          grep -q 'canonical repository' .github/workflows/README.md || { echo 'Release workflow README must document canonical repository behavior.'; exit 1; }
