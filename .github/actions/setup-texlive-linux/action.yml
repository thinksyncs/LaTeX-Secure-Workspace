name: Setup TeX Live (current) on Linux
description: Install and cache the TeX Live toolchain used by CI and release workflows.
inputs:
  cache-version:
    description: Cache version prefix for TeX Live
    required: false
    default: tl-current-v1
runs:
  using: composite
  steps:
    - name: Set up PATH
      shell: bash
      run: |
        echo "/tmp/texlive/bin/x86_64-linux" >> "$GITHUB_PATH"
    - name: Cache TeX Live
      id: cache-texlive
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
      with:
        path: /tmp/texlive
        key: ${{ inputs.cache-version }}-${{ runner.os }}-texlive-essential
        restore-keys: |
          ${{ inputs.cache-version }}-${{ runner.os }}-texlive-essential
    - name: Download and verify install-tl archive
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: bash
      env:
        TEXLIVE_KEY_FINGERPRINT: C78B82D8C79512F79CC0D7C80D5E5D9106BAB6BC
      run: |
        INSTALLER_URL="$(curl --fail --show-error --silent --location --output /dev/null --write-out '%{url_effective}' --proto '=https' --tlsv1.2 https://mirror.ctan.org/systems/texlive/tlnet/install-tl-unx.tar.gz)"
        INSTALLER_BASE="${INSTALLER_URL%/*}"
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -o install-tl-unx.tar.gz "$INSTALLER_URL"
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -o install-tl-unx.tar.gz.sha512 "$INSTALLER_BASE/install-tl-unx.tar.gz.sha512"
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -o install-tl-unx.tar.gz.sha512.asc "$INSTALLER_BASE/install-tl-unx.tar.gz.sha512.asc"
        curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 -O https://tug.org/texlive/files/texlive.asc
        test "$(gpg --show-keys --with-colons texlive.asc | awk -F: '/^fpr:/ {print $10; exit}')" = "$TEXLIVE_KEY_FINGERPRINT"
        sha512sum --check install-tl-unx.tar.gz.sha512
        export GNUPGHOME="$(mktemp -d)"
        gpg --batch --import texlive.asc
        gpg --batch --verify install-tl-unx.tar.gz.sha512.asc install-tl-unx.tar.gz.sha512
        tar -xzf install-tl-unx.tar.gz
        INSTALL_DIR="$(find . -maxdepth 1 -type d -name 'install-tl-*' | head -n 1)"
        test -n "$INSTALL_DIR"
        mv "$INSTALL_DIR" install-tl-dir
        rm -rf "$GNUPGHOME"
    - name: Run install-tl
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: bash
      run: |
        install-tl-dir/install-tl --profile "$GITHUB_WORKSPACE/test/config/texlive_linux.profile"
    - name: Install TeX Live packages
      if: steps.cache-texlive.outputs.cache-hit != 'true'
      shell: bash
      run: |
        tlmgr update --self
        tlmgr install collection-latex
        tlmgr install import subfiles latexmk makeindex
        tlmgr install chktex lacheck latexindent
    - name: Create latexindent wrapper
      shell: bash
      run: |
        SCRIPT_PATH="$(kpsewhich latexindent.pl || true)"
        if [ -n "$SCRIPT_PATH" ]; then
          printf '%s\n' '#!/bin/sh' 'exec perl "'"$SCRIPT_PATH"'" "$@"' > /tmp/texlive/bin/x86_64-linux/latexindent
          chmod +x /tmp/texlive/bin/x86_64-linux/latexindent
        else
          command -v latexindent >/dev/null
        fi
