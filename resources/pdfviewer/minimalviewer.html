<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta
            http-equiv="Content-Security-Policy"
            content="default-src 'none'; base-uri 'none'; object-src 'none'; connect-src %CSP_SOURCE%; script-src %CSP_SOURCE%; script-src-elem %CSP_SOURCE%; script-src-attr 'none'; style-src %CSP_SOURCE%; style-src-elem %CSP_SOURCE%; style-src-attr 'unsafe-inline'; img-src blob: data: %CSP_SOURCE%; font-src %CSP_SOURCE%; worker-src blob: %CSP_SOURCE%;"
        />
        <title>PDF Preview</title>
        <meta id="pdf-preview-config" data-config="%VIEWER_CONFIG%" />
        <link rel="stylesheet" href="%VIEWER_CSS%" />
        <script type="module" src="%VIEWER_SCRIPT%"></script>
    </head>
    <body>
        <div id="app">
            <div id="statusBar">
                <div id="viewerControls" aria-label="PDF controls">
                    <button id="prevPage" type="button" title="Previous page" aria-label="Previous page">‹</button>
                    <input id="pageInput" type="number" min="1" value="1" aria-label="Page number" />
                    <span id="pageCount">/ –</span>
                    <button id="nextPage" type="button" title="Next page" aria-label="Next page">›</button>
                    <select id="zoomSelect" aria-label="Zoom">
                        <option value="page-width">Width</option>
                        <option value="page-fit">Fit</option>
                        <option value="0.75">75%</option>
                        <option value="1">100%</option>
                        <option value="1.25">125%</option>
                        <option value="1.5">150%</option>
                        <option value="2">200%</option>
                    </select>
                    <input id="searchInput" type="search" placeholder="Search" aria-label="Search PDF text" />
                    <button id="prevMatch" type="button" title="Previous match" aria-label="Previous match">↑</button>
                    <button id="nextMatch" type="button" title="Next match" aria-label="Next match">↓</button>
                </div>
                <span id="statusText">Loading PDF…</span>
            </div>
            <div id="viewerContainer">
                <div id="pages"></div>
            </div>
        </div>
    </body>
</html>
