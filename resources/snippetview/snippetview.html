<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="Content-Security-Policy" content="default-src 'none'; base-uri 'none'; connect-src %CSP%; script-src %CSP% 'unsafe-inline' blob:; style-src %CSP% 'unsafe-inline';">
        <script>
            var mathSymbolsJsonUrl = '%RESOURCE_ROOT%/snippetpanel.json';
        </script>
        <script src="%RESOURCE_ROOT%/snippetview.js" defer></script>
        <script>
            var pdfjsWorkerUrl = '%PDF_WORKER%';
            var pdfjsCMapUrl = '%PDF_CMAPS%';
        </script>
        <script src="%PDFJS_ROOT%/build/pdf.mjs" type="module"></script>
        <script src="%RESOURCE_ROOT%/pdfrenderer.js" defer></script>
        <link rel="stylesheet" href="%RESOURCE_ROOT%/snippetview.css">
    </head>
    <body>
        <div id="Symbols" class="tabcontent">
            <div class="header">
                <input type="text" name="search" id="symbolsearch" placeholder="{%mathsymbols.search%}" oninput="mathSymbolSearch()" />
                <select onchange="mathSymbolSearch()"> </select>
            </div>

            <div class="grid"></div>
        </div>
    </body>
</html>
